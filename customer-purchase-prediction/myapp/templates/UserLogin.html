<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Purchase Prediction</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI',sans-serif; background:#f0f2f5; }
        .navbar { background:#1a1a2e; color:white; padding:15px 30px; display:flex; justify-content:space-between; }
        .navbar h2 { color:#e94560; }
        .navbar a { color:#ccc; text-decoration:none; margin-left:20px; }
        .container { max-width:400px; margin:80px auto; background:white; padding:40px; border-radius:10px; box-shadow:0 2px 15px rgba(0,0,0,0.1); }
        h2 { text-align:center; color:#1a1a2e; margin-bottom:25px; }
        input { width:100%; padding:10px; margin:8px 0; border:1px solid #ddd; border-radius:5px; font-size:0.95rem; }
        button { width:100%; padding:12px; background:#e94560; color:white; border:none; border-radius:5px; font-size:1rem; cursor:pointer; margin-top:10px; }
        button:hover { background:#c73652; }
        .err { background:#f8d7da; color:#721c24; padding:10px; border-radius:5px; margin-bottom:15px; text-align:center; }
        a { color:#e94560; }
    </style>
</head>
<body>
    <div class="navbar">
        <h2>🛒 Purchase Prediction</h2>
        <div><a href="/">Home</a><a href="/register/" style="margin-left:20px">Register</a></div>
    </div>
    <div class="container">
        <h2>User Login</h2>
        {% if messages %}{% for msg in messages %}<div class="err">{{ msg }}</div>{% endfor %}{% endif %}
        <form method="POST">
            {% csrf_token %}
            <input type="text" name="loginid" placeholder="Login ID" required>
            <input type="password" name="pswd" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <p style="text-align:center;margin-top:15px">No account? <a href="/register/">Register here</a></p>
    </div>
</body>
</html>

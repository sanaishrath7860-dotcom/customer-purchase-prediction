<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI',sans-serif; background:#f0f2f5; }
        .navbar { background:#1a1a2e; padding:15px 30px; }
        .navbar h2 { color:#e94560; }
        .container { max-width:400px; margin:80px auto; background:white; padding:40px; border-radius:10px; box-shadow:0 2px 15px rgba(0,0,0,0.1); }
        h2 { text-align:center; color:#1a1a2e; margin-bottom:25px; }
        input { width:100%; padding:10px; margin:8px 0; border:1px solid #ddd; border-radius:5px; }
        button { width:100%; padding:12px; background:#e94560; color:white; border:none; border-radius:5px; font-size:1rem; cursor:pointer; margin-top:10px; }
        .err { background:#f8d7da; color:#721c24; padding:10px; border-radius:5px; margin-bottom:15px; text-align:center; }
    </style>
</head>
<body>
    <div class="navbar"><h2>🛒 Admin Panel</h2></div>
    <div class="container">
        <h2>Admin Login</h2>
        {% if messages %}{% for msg in messages %}<div class="err">{{ msg }}</div>{% endfor %}{% endif %}
        <form method="POST">
            {% csrf_token %}
            <input type="text" name="loginid" placeholder="Admin Login ID" required>
            <input type="password" name="pswd" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
